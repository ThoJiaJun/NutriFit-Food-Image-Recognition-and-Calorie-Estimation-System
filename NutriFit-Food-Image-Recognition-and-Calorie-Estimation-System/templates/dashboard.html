<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - NutriFit</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        h1 { margin: 0 0 10px; color: #764ba2; }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: #f9f9ff;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #eee;
        }
        .progress-bar {
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
        }
        .progress-fill {
            background: #764ba2;
            width: 0%;
            height: 100%;
        }
        .meal-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
        }
        button {
            background: #764ba2;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
        }
          .nav {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 10px;
        }
        .nav a {
            text-decoration: none;
            color: #764ba2;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="nav">
        <a href="{{ url_for('profile', user_id=user.id) }}">Profile</a>
        <a href="#">History</a>
        <a href="{{ url_for('login') }}">Logout</a>
    </div>

    <h1>🍏 NutriFit Dashboard</h1>
    <p>Welcome back, <strong>{{ user.name }}</strong>!</p>

    <div class="grid">
        <div class="card">
            <h3>📊 Today's Progress</h3>
            <div><span id="todayCalories"></span> / <span id="dailyGoal"></span> kcal</div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div>🔥 Remaining: <span id="remaining"></span> kcal</div>
        </div>
        <div class="card">
            <h3>🍽️ Meal Breakdown</h3>
            <div class="meal-row"><span>Breakfast</span><span id="breakfast"></span></div>
            <div class="meal-row"><span>Lunch</span><span id="lunch"></span></div>
            <div class="meal-row"><span>Dinner</span><span id="dinner"></span></div>
            <div class="meal-row"><span>Snack</span><span id="snack"></span></div>
        </div>
        <div class="card">
            <h3>📸 Quick Action</h3>
            <button onclick="alert('Camera feature coming soon')">Take Photo of Meal</button>
        </div>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="/login">🚪 Logout</a>
    </div>
</div>

<script>
    
    const todayCalories = {{ today_calories }};
    const dailyGoal = {{ daily_goal }};
    const remaining = {{ remaining }};
    const progress = {{ progress }};

    const meals = {{ meals | tojson }};

    document.getElementById('todayCalories').innerText = todayCalories;
    document.getElementById('dailyGoal').innerText = dailyGoal;
    document.getElementById('remaining').innerText = remaining;
    document.getElementById('progressFill').style.width = progress + '%';

    document.getElementById('breakfast').innerText = meals.breakfast;
    document.getElementById('lunch').innerText = meals.lunch;
    document.getElementById('dinner').innerText = meals.dinner;
    document.getElementById('snack').innerText = meals.snack;
</script>
</body>
</html>

<!DOCTYPE html>
<html>
    <head>
        <title>Login - NutriFit</title>
<style>
  body { 
    font-family: Arial;
         background: linear-gradient(to 135deg, #667eea, #764ba2);
          display: flex;
          justify-content: center; 
          align-items: center; 
          height: 100vh; margin: 0;
         }
    .container {
        background-color: white;
             padding: 40px;
             border-radius: 20px;
             width: 400px;
            }
         h1 {
             text-align: center;
             color:#764ba2
         }
         h3 {
             text-align: center;
             color:#333;
         }
    input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 10px;
        box-sizing: border-box;
    }
    button {
        width: 100%;
        padding: 12px;
        background-color: #764ba2;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
    }
    button:hover {
        background-color: #5a3a7a;
    }
    .flash {
        padding: 10px;
        border-radius: 10px;
        margin: 10px 0;
        text-align: center;
    }
    .success {
        background-color: #d4edda;
        color: #155724;
    }
    .danger {
        background-color: #f8d7da;
        color: #721c24;
    }
    a {
        color : #764ba2;
        text-decoration: none;
    }
    a:hover {
        text-decoration: underline;
    }               
    .forgot-password {
        text-align: center;
        margin-top: 5px;
        margin-bottom: 15px;
    }
    .forgot-password a {
        font-size: 14px;
    }
    p {
        text-align: center;
        margin-top: 20px;
    }
</style>
    </head>
    <body>
        <div class="container">
            <h1>NutriFit</h1>
            <h3>Login</h3>
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}
            <form method="POST">
                <input type="email" name="email" placeholder="Email" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form> 
            <div class="forgot-password">
                <a href="/forgot_password">Forgot Password?</a>
            </div>
            <p>Don't have an account? <a href="/register">Register here</a></p>
        </div>  
    </body>
</html>

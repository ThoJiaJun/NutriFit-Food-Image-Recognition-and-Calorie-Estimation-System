<!DOCTYPE html>
<html>
<head>
    <title>Profile - NutriFit</title>
<style>
  body {        
    font-family: Arial;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center; 
    align-items: center; 
    height: 100vh; 
    margin: 0;
  }
  .container {
    background: white;
    padding: 40px;
    border-radius: 20px;
    width: 500px;
  }
  h1 {
    text-align: center;
    color: #764ba2;
  }
  h3 {
    text-align: center;
    color: #333;
  }
  label {
    display: block;
    margin-top: 10px;
    margin-bottom: 5px;
    color: #333;
    font-weight: bold;
  }
  input, select {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border: 1px solid #ddd;
    border-radius: 10px;
    box-sizing: border-box;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #764ba2;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 20px;
  }
  button:hover {
    background: #5a3a7a;
  }
  .flash {
    padding: 10px;
    border-radius: 10px;
    margin: 10px 0;
    text-align: center;
  }
  .success {
    background: #d4edda;
    color: #155724;
  }
  .danger {
    background: #f8d7da;
    color: #721c24;
  }
  a {
    color: #764ba2;
    text-decoration: none;
  }
  .email-display {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 10px;
    margin: 10px 0;
    color: #666;
  }
  .row {
    display: flex;
    gap: 10px;
  }
  .row .col {
    flex: 1;
  }
  p {
    text-align: center;
    margin-top: 20px;
  }
</style>
</head>
<body>
    <div class="container">
        <h1>NutriFit</h1>
        <h3>My Profile</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <label>Full Name</label>
            <input type="text" name="name" value="{{ user.name }}" placeholder="Full Name" required>

            <div class="email-display">
                Email: {{ user.email }}
            </div>

            <div class="row">
                <div class="col">
                    <label>Height (cm)</label>
                    <input type="number" step="0.1" name="height" value="{{ user.height }}" placeholder="Height (cm)">
                </div>
                <div class="col">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" value="{{ user.weight }}" placeholder="Weight (kg)">
                </div>
                <div class="col">
                    <label>Age</label>
                    <input type="number" name="age" value="{{ user.age }}" placeholder="Age">
                </div>
            </div>

            <label>Gender</label>
            <select name="gender">
                <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
            </select>

            <label>Activity Level</label>
            <select name="activity_level">
                <option value="sedentary" {% if user.activity_level == 'sedentary' %}selected{% endif %}>Sedentary (Little or no exercise)</option>
                <option value="light" {% if user.activity_level == 'light' %}selected{% endif %}>Lightly Active (1-3 days/week)</option>
                <option value="moderate" {% if user.activity_level == 'moderate' %}selected{% endif %}>Moderately Active (3-5 days/week)</option>
                <option value="active" {% if user.activity_level == 'active' %}selected{% endif %}>Very Active (6-7 days/week)</option>
            </select>

            <label>Goal</label>
            <select name="goal">
                <option value="lose" {% if user.goal == 'lose' %}selected{% endif %}>Lose Weight</option>
                <option value="maintain" {% if user.goal == 'maintain' %}selected{% endif %}>Maintain Weight</option>
                <option value="gain" {% if user.goal == 'gain' %}selected{% endif %}>Gain Muscle</option>
            </select>

            <button type="submit">Save Changes</button>
        </form>

        <p>
            <a href="/login">Logout</a>
        </p>
    </div>
</body>
</html>

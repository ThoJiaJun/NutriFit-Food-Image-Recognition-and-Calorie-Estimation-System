<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - NutriFit</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        .bar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }
        h1 {
            margin: 10px;
            color: #333;
            font-size: 30px;
        }
        .container {
            background: white;
            padding: 10px 40px;
            margin-bottom: 30px;
            border-radius: 20px;
            width: 400px;
        }
        h1 {
            color: #333;
            font-size: 30px;
        }
        h3 {
            text-align: center;
            color: #333;
            margin-bottom: 8px;
        }
         .line {
            width: 100%;
            height: 1px;
            background-color: #ccc;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-top: 10px;
            color: #333;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 30px;
            background: #10b981;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover {
            background: #0d9b6b;
        }
        .flash {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .danger {
            background: #f8d7da;
            color: #721c24;
        }
        a {
            color: #10b981;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bar">
        <h1>🍏 NutriFit</h1>
    </div>

    <div class="container">
        <h3>Reset Password</h3>
        <div class="line"></div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('reset_password', email=email) }}" method="POST">
            <label>New Password</label>
            <input type="password" name="new_password" placeholder="New Password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Reset Password</button>
        </form>

        <p style="text-align:center">
            <a href="/login">Back to Login</a>
        </p>
    </div>
</body>
</html>

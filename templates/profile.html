<!DOCTYPE html>
<html>
<head>
    <title>Profile - NutriFit</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }
        .navbar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }

        .navbar a {
            text-decoration: none;
            cursor: pointer;
        }
        h1 {
            margin: 10px;
            color: #333;
            font-size: 30px;
        }
        .user_button {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }
        .user_button:hover {
            background: #e6f4ee;
        }
        .dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 150px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }
        .dropdown a {
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
        } 
        .dropdown a:hover {
            background: #f5f5f5;
            font-weight: bold;
        }
        .dropdown.show {
            display: block;
        }
        .container {
            background: white;
            padding: 0 40px;
            border-radius: 20px;
            width: 500px;
        }
        h2 {
            text-align: center;
            font-size: 40px;
            margin-bottom: 0;
        }
        h3 {
            text-align: center;
            font-size: 30px;
            color: #333;
            margin-top: 0;
        }
        label {
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #10b981;
            color: white;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover {
            background: #0d9b6b;
        }
        .flash {
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            text-align: center;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .danger {
            background: #f8d7da;
            color: #721c24;
        }
        a {
            color: #10b981;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .email-display {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 10px;
            margin: 10px 0;
            color: #666;
        }
        .row {
            display: flex;
            gap: 10px;
        }
        .row .col {
            flex: 1;
        }
        p {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🍏 NutriFit</h1>
        <h1>Your Personal Info</h1>
        <div>
            <h1 title="User Dropdown" class="user_button">👤 {{ user.name }}</h1>

            <div class="dropdown">
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>👤</h2>
        <h3>{{ user.name }}</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        
        <form method="POST">
            <label>Name</label>
            <input type="text" name="name" value="{{ user.name }}" placeholder="Name" required>

            <div class="email-display">
                Email: {{ user.email }}
            </div>

            <div class="row">
                <div class="col">
                    <label>Height (cm)</label>
                    <input type="number" step="0.1" name="height" value="{{ user.height }}" placeholder="Height (cm)">
                </div>
                <div class="col">
                    <label>Weight (kg)</label>
                    <input type="number" step="0.1" name="weight" value="{{ user.weight }}" placeholder="Weight (kg)">
                </div>
                <div class="col">
                    <label>Age</label>
                    <input type="number" name="age" value="{{ user.age }}" placeholder="Age">
                </div>
            </div>

            <label>Gender</label>
            <select name="gender">
                <option value="male" {% if user.gender == 'male' %}selected{% endif %}>Male</option>
                <option value="female" {% if user.gender == 'female' %}selected{% endif %}>Female</option>
                <option value="other" {% if user.gender == 'other' %}selected{% endif %}>Other</option>
            </select>

            <label>Activity Level</label>
            <select name="activity_level">
                <option value="sedentary" {% if user.activity_level == 'sedentary' %}selected{% endif %}>Sedentary (Little or no exercise)</option>
                <option value="light" {% if user.activity_level == 'light' %}selected{% endif %}>Lightly Active (1-3 days/week)</option>
                <option value="moderate" {% if user.activity_level == 'moderate' %}selected{% endif %}>Moderately Active (3-5 days/week)</option>
                <option value="active" {% if user.activity_level == 'active' %}selected{% endif %}>Very Active (6-7 days/week)</option>
            </select>

            <label>Goal</label>
            <select name="goal">
                <option value="lose" {% if user.goal == 'lose' %}selected{% endif %}>Lose Weight</option>
                <option value="maintain" {% if user.goal == 'maintain' %}selected{% endif %}>Maintain Weight</option>
                <option value="gain" {% if user.goal == 'gain' %}selected{% endif %}>Gain Muscle</option>
            </select>

            <button type="submit">Save Changes</button>
        </form>

        <p>
            <a href="/dashboard">Back to Dashboard</a>
        </p>
    </div>

<script>
    const user_button = document.querySelector(".user_button");
    const dropdown = document.querySelector(".dropdown");

    user_button.addEventListener("click", () => {
        dropdown.classList.toggle("show");
    });

    document.addEventListener("click", (event) => {
        if(
            !user_button.contains(event.target) &&
            !dropdown.contains(event.target)
        ){
            dropdown.classList.remove("show");
        }

    });
</script>
</body>
</html>

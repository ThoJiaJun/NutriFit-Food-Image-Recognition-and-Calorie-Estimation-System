<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Page</title>

    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #baf8da;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .navbar{
            width: 100%;
            background-color: #a3f6ce;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 40px;
            box-sizing: border-box;
        }

        .navbar a{
            text-decoration: none;
            color: inherit;
        }
        
        .logo{
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        h1{
            font-size: 48px;
            color: #333;
        }

        form{
            margin: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;           
        }

        .container{
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            background-color: #ffffff;
            padding: 30px;
            border: 2px dashed #666;
            border-radius: 40px;
            text-align: center;
            width: 75%;
            max-width: 720px;
            height: 50%;
            max-height: 240px;
        }

        #upload p{
            color: #666;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.5s;
        }

        #upload p:hover{
            color: #10b981
        }

        input[type = "file"]{
            display: none;
        }

        img{
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 40px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>
</head>

<body>
    <div class = "navbar">
        <a href = "/dashboard"><h1 title = "Back to Dashboard" class = "logo">🍏 NutriFit</h1></a>
    </div>
    
    <h1>Upload Food Image</h1>

    <form action = "/upload" method = "post" enctype = "multipart/form-data" onsubmit = "return confirm_image()">
        <div class = "container">
        
            <label id = "upload" for = "img_file">
                <p>Click To Upload Image</p>
            </label>

            <input type = "file" id = "img_file" name ="file" accept = "image/*">

            <img id = "preview" alt = "Image Preview">

        </div>
    
        <div class = "buttons">
            <button type = "button" class = "retry" onclick = "reset_image()">Try Again</button>
            <button type = "submit" class = "confirm">Confirm Image</button>
        </div>
    </form>

    <script>
        const img_file = document.getElementById("img_file");
        const preview = document.getElementById("preview");
        const upload_label = document.getElementById("upload");

        img_file.addEventListener('change', function(){
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.addEventListener('load', function(){
                    preview.src = this.result;
                    preview.style.display = 'block';
                    upload_label.style.display = "none";
                });

                reader.readAsDataURL(file);
            }
        });

        function reset_image(){
            img_file.value = "";
            preview.src = "";
            preview.style.display = "none";
            upload_label.style.display = "block";
        }

        function confirm_image(){
            if (!img_file.files.length){
                alert("Please upload an image first!");
                return false;
            }

            return true;
        }
    </script>
</body>
</html>

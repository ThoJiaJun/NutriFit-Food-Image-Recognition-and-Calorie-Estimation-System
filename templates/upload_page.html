<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }

        .navbar{
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }

        .navbar a{
            text-decoration: none;
            cursor: pointer;
        }

        h1{
            margin: 10px;
            color: #333;
            font-size: 30px;
        }

        .user_button{
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }

        .user_button:hover{
            background: #e6f4ee;
        }

        .dropdown{
            position: absolute;
            top: 70px;
            right: 20px;
            width: 150px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }

        .dropdown a{
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
        } 

        .dropdown a:hover{
            background: #f5f5f5;
            font-weight: bold;
        }

        .dropdown.show{
            display: block;
        }

        form{
            margin: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;           
        }

        .container{
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            background-color: #ffffff;
            padding: 30px;
            border: 2px dashed #666;
            border-radius: 40px;
            text-align: center;
            width: 75%;
            max-width: 720px;
            height: 50%;
            max-height: 240px;
        }

        #upload p{
            color: #666;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.5s;
        }

        #upload p:hover{
            color: #10b981
        }

        input[type = "file"]{
            display: none;
        }

        img{
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 40px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="/dashboard"><h1 title="Back to Dashboard">🍏 NutriFit</h1></a>
        <h1>Upload Image</h1>
        <div>
            <h1 title="User Dropdown" class="user_button">👤 {{ user.name }}</h1>

            <div class="dropdown">
                <a href="/profile">Edit Profile</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    <form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
        <div class = "container">
        
            <label id="upload" for="img_file">
                <p>Click To Upload Image</p>
            </label>

            <input type="file" id="img_file" name="file" accept="image/*">

            <img id="preview" alt="Image Preview">

        </div>
    
        <div class="buttons">
            <button type="button" class="retry" onclick="reset_image()">Try Again</button>
            <button type="submit" class="confirm" onclick="return confirm_image()">Confirm Image</button>
        </div>
    </form>

    <script>
        const user_button = document.querySelector(".user_button");
        const dropdown = document.querySelector(".dropdown");
        const img_file = document.getElementById("img_file");
        const preview = document.getElementById("preview");
        const upload_label = document.getElementById("upload");
        const container = document.querySelector(".container");

        // User Dropdown
        user_button.addEventListener("click", () => {
            dropdown.classList.toggle("show");
        });

        document.addEventListener("click", (event) => {
            if(
                !user_button.contains(event.target) &&
                !dropdown.contains(event.target)
            ){
                dropdown.classList.remove("show");
            }
        });

        // Img Upload
        img_file.addEventListener("change", function(){
            const file = this.files[0];

            if(file){
                const reader = new FileReader();

                // Display preview img
                reader.addEventListener("load", function(){
                    preview.src = this.result;
                    preview.style.display = "block";
                    upload_label.style.display = "none";
                });

                reader.readAsDataURL(file);
            }
        });

        // Drag and Drop img
        container.addEventListener("dragover", e => e.preventDefault());    // Prevent browser from opening the img in new tab

        container.addEventListener("drop", (e) => {
            e.preventDefault();

            if(e.dataTransfer.files.length > 0){
                img_file.files = e.dataTransfer.files;          // Assign the dropped img to the input
                img_file.dispatchEvent(new Event("change"));    // Preview the dropped img
            }
        });

        // Reset container to blank state
        function reset_image(){
            img_file.value = "";
            preview.src = "";
            preview.style.display = "none";
            upload_label.style.display = "block";
        }

        // Check if img exists
        function confirm_image(){
            if(!img_file.files.length){
                alert("Please upload an image first!");
                return false;
            }
            return true;
        }
    </script>
</body>
</html>

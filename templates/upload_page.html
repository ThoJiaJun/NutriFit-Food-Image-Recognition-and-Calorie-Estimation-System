<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background: #baf8da;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        h1{
            font-size: 48px;
            color: #333;
        }

        .container{
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
            background-color: #ffffff;
            padding: 30px;
            border: 2px dashed #666;
            border-radius: 40px;
            text-align: center;
            width: 75%;
            max-width: 720px;
            height: 50%;
            max-height: 240px;
        }

        .upload p{
            margin: 10px;
            color: #666;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.5s;
        }

        .upload p:hover{
            color: #10b981
        }

        input[type = "file"]{
            display: none;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: none;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 40px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>

    <h1>Upload Food Image</h1>

    <div class = "container">
        

        <label class = "upload" for = "fileInput">
            <p>Click To Upload Image</p>
        </label>

        <input type = "file" id = "fileInput" accept = "image/*">

        <img id = "preview" alt = "Image Preview">

    </div>
    
    <div class = "buttons">
        <button class = "retry" onclick="reset_image()">Try Again</button>
        <button class = "confirm" onclick = "confirm_image()">Confirm Image</button>
    </div>

    <script>
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');

        fileInput.addEventListener('change', function() {
            const file = this.files[0];

            if (file) {
                const reader = new FileReader();

                reader.addEventListener('load', function() {
                    preview.src = this.result;
                    preview.style.display = 'block';
                });

                reader.readAsDataURL(file);
            }
        });

        function reset_image() {
            fileInput.value = "";
            preview.src = "";
            preview.style.display = "none";
        }

        function confirm_image() {
            const file = fileInput.files[0];

            if (!file) {
                alert("Please upload an image first!");
                return;
            }

            alert("Image submitted!");      <!--will connect to flask for food recognition-->
        }
    </script>
</body>
</html>

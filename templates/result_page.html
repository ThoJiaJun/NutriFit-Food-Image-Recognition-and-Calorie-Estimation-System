<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }

        h1{
            margin-top: 40px;
            font-size: 48px;
            color: #333;
        }

        .card{
            background: #ffffff;
            width: 70%;
            max-width: 700px;
            border-radius: 40px;
            padding: 40px;
            margin-top: 30px;
            text-align: center;
        }

        .food_name{
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 50px;
        }

        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 100px;
            row-gap: 50px;
            text-align: left;
            padding: 0 40px;
        }

        .nutrition{
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .value{
            font-size: 25px;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 40px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>
    
    <h1>Result</h1>

    <div class = "card">
        <div class = "food_name">(Food Name)</div>

        <div class = "grid">
            <div class = "item">
                <span class = "nutrition">Calories</span>
                <span class = "value">350 kcal</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Carbs</span>
                <span class = "value">50 g</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Proteins</span>
                <span class = "value">15 g</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Fats</span>
                <span class = "value">10 g</span>
            </div>
        </div>
    </div>

    <div class = "buttons">
        <button class = "retry">Try Again</button>
        <button class = "confirm">Confirm Meal</button>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Page</title>

    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #baf8da;
            min-height: 100vh;
        }

        .navbar{
            width: 100%;
            background-color: #a3f6ce;
            position: sticky;
            top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 40px;
            box-sizing: border-box;
        }

        .navbar a{
            text-decoration: none;
            color: inherit;
        }
        
        .logo{
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        h1{
            margin-top: 40px;
            font-size: 48px;
            color: #333;
        }

        .container{
            background: #ffffff;
            width: 70%;
            max-width: 700px;
            border-radius: 40px;
            padding: 40px;
            margin-top: 10px;
            text-align: center;
        }

        .food_name{
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 50px;
        }

        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 100px;
            row-gap: 50px;
            text-align: left;
            padding: 0 40px;
        }

        .nutrition{
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .value{
            font-size: 25px;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 30px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>
</head>
<body>    
    <div class = "navbar">
        <a href = "/dashboard"><h1 title = "Back to Dashboard" class = "logo">🍏 NutriFit</h1></a>
    </div>
    
    <h1>Result</h1>

    <div class = "container">
        <div class = "food_name" id = "food_name">{{food["name"]}}</div>

        <div class = "grid">
            <div class = "item">
                <span class = "nutrition">Calories</span>
                <span class = "value" id = "calories">{{food["calories"]}}</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Carbs</span>
                <span class = "value" id = "carbs">{{food["carbs"]}}</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Proteins</span>
                <span class = "value" id = "protein">{{food["protein"]}}</span>
            </div>

            <div class = "item">
                <span class = "nutrition">Fats</span>
                <span class = "value" id = "fats">{{food["fats"]}}</span>
            </div>
        </div>
    </div>

    <div class = "buttons">
        <button class = "retry" onclick = "window.location.href = '/upload'">Try Again</button>
        <button class = "confirm" onclick = "confirm_meal()">Confirm Meal</button>
    </div>

    <script>
        function confirm_meal(){
            let meal_data = {
                food_name: document.getElementById("food_name").innerText,
                calories: parseFloat(document.getElementById("calories").innerText),
                carbs: parseFloat(document.getElementById("carbs").innerText),
                protein: parseFloat(document.getElementById("protein").innerText),
                fats: parseFloat(document.getElementById("fats").innerText),
                servings: 1
            };

            fetch("/save_meal", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(meal_data)
            })

            .then(res => res.json())
            .then(() => {
                alert("Meal saved!");
                window.location.href = "/history";
            });
        }
    </script>
</body>
</html>

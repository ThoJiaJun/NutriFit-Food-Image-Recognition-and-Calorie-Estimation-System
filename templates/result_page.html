<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body{
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100vh;
        }

        .navbar{
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }

        .navbar a{
            text-decoration: none;
            cursor: pointer;
        }

        h1{
            margin: 10px;
            color: #333;
            font-size: 30px;
        }

        .user_button{
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }

        .user_button:hover{
            background: #e6f4ee;
        }

        .dropdown{
            position: absolute;
            top: 70px;
            right: 20px;
            width: 150px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }

        .dropdown a{
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
        } 

        .dropdown a:hover{
            background: #f5f5f5;
            font-weight: bold;
        }

        .dropdown.show{
            display: block;
        }
        
        .container{
            background: #ffffff;
            width: 70%;
            max-width: 700px;
            border-radius: 40px;
            padding: 40px;
            margin-top: 10px;
            text-align: center;
        }

        .food{
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 50px;
        }

        .grid{
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 100px;
            row-gap: 50px;
            text-align: left;
            padding: 0 40px;
        }

        .nutrition{
            font-size: 20px;
            font-weight: bold;
            display: block;
            margin-bottom: 5px;
        }

        .value{
            font-size: 25px;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 30px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 780px;
        }

        .retry{
            background-color: #f76565;
        }

        .retry:hover{
            background-color: #f55050;
        }

        .confirm{
            background-color: #10b981;
        }

        .confirm:hover{
            background-color: #0d9b6b;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/dashboard"><h1 title="Back to Dashboard">🍏 NutriFit</h1></a>
        <h1>Result</h1>
        <div>
            <h1 title="User Dropdown" class="user_button">👤 {{ user.name }}</h1>

            <div class="dropdown">
                <a href="/profile">Edit Profile</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    {% for food in foods %}
    <div class="container">
        <div class="food">
            <span class="food_name">{{food["name"]}}</span>
             × 
             <span class="quantity">{{food["quantity"]}}</span>
        </div>

        <div class="grid">
            <div class="item">
                <span class="nutrition">Calories</span>
                <span class="value calories">{{food["calories"]}}</span>
            </div>

            <div class="item">
                <span class="nutrition">Carbs</span>
                <span class="value carbs">{{food["carbs"]}}</span>
            </div>

            <div class="item">
                <span class="nutrition">Proteins</span>
                <span class="value protein">{{food["protein"]}}</span>
            </div>

            <div class="item">
                <span class="nutrition">Fats</span>
                <span class="value fats">{{food["fats"]}}</span>
            </div>
        </div>
    </div>
    {% endfor %}

    <div class="buttons">
        <button class="retry" onclick="window.location.href='/edit'">Back To Edit</button>
        <button class="confirm" onclick="confirm_meal()">Confirm Meal</button>
    </div>

<script>
    const user_button = document.querySelector(".user_button");
    const dropdown = document.querySelector(".dropdown");

    user_button.addEventListener("click", () => {
        dropdown.classList.toggle("show");
    });

    document.addEventListener("click", (event) => {
        if(
            !user_button.contains(event.target) &&
            !dropdown.contains(event.target)
        ){
            dropdown.classList.remove("show");
        }

    });

    function confirm_meal(){
        let meal_items = []
        const containers = document.querySelectorAll(".container");
        
        containers.forEach(container => {
            let meal_data = {
                food_name: container.querySelector(".food_name").innerText,
                servings: parseInt(container.querySelector(".quantity").innerText),
                calories: parseFloat(container.querySelector(".calories").innerText),
                carbs: parseFloat(container.querySelector(".carbs").innerText),
                protein: parseFloat(container.querySelector(".protein").innerText),
                fats: parseFloat(container.querySelector(".fats").innerText),
            };
            meal_items.push(meal_data);
        });

        fetch("/save_meal", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(meal_items)
        })

        .then(res => res.json())
        .then(() => {
            alert("Meal saved!");
            window.location.href = "/history";
        });
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
        body{
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #baf8da;
            height: 100vh;
        }
        
        h1{
            font-size: 48px;
            color: #333;
            text-align: center;
        }

        .tabs{
            display: flex;
            justify-content: flex-start;
            gap: 50px;
            margin-bottom: 30px;
            width: 80%;
        }

        button{
            padding: 10px 25px;
            width: 150px;
            background-color: #10b981;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.5s;
        }

        button:hover{
            background-color: #0d9b6b;
        }

        button.active{
            background-color: #0d9b6b;
            border: 2px solid #333;
        }

        .container{
            display: flex;
            flex-direction: column;
            width: 80%;
            min-height: 300px;
            max-height: fit-content;
            border-radius: 40px;
            padding: 20px;
            background-color: #ffffff;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding-bottom: 10px;
            margin-bottom: 10px;
            border-bottom: 2px solid #666;
        }

        .keepleft{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #date_picker{
            border: none;
            outline: none;
            background-color: #ffffff;
            font-family: Arial, sans-serif;
            font-size: 16px;
            cursor: pointer;
        }

        #popup{
            position: fixed;
            top: 30%;
            left: 25%;
            width: 50%;
            height: 180px;
            background-color: #ecfdf5;
            box-shadow: 0 10px 25px #00000026;
            border-radius: 15px;
            text-align: center;
            display: none;
        }

        #popup.show_popup{
            display: block;
        }

        .popup_button{
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-top: 20px;
        }

        .confirm_dlt{
            background-color: #f55050;
        }

        .confirm_dlt:hover{
            background-color: #ef3636;
        }

        .cancel_dlt{
            background-color: #e5e7eb;
            color: #333;
        }

        .cancel_dlt:hover{
            background-color: #d1d5db;
        }
    </style>

    <h1>Meal History</h1>

    <div class = "tabs">
        <button class = "active" id = "daily">Daily</button>
        <button id = "weekly">Weekly</button>
        <button id = "monthly">Monthly</button>
    </div>

    <div class = "container">
        <div class = "header">
            <div class = "keepleft">
                <input type = "date" id = "date_picker">
                <span id = "week_label"></span>
            </div>
            <span id = "total_calories">Total Calories: 0 kcal</span>
        </div>

        <div id = "meal_list"></div>
    </div>

    <div id = "popup">
        <h2>Delete Confirmation</h2>
        <p>Are you sure you want to delete this meal?</p>
        <div class = "popup_button">
            <button class = "cancel_dlt" onclick = "close_popup()">Cancel</button>
            <button class = "confirm_dlt" onclick = "close_popup()">Delete</button>
        </div>
    </div>

    <script>
        let current_tab = "daily"
        
        const buttons = document.querySelectorAll(".tabs button");
        const meal_list = document.getElementById("meal_list");
        const total_calories = document.getElementById("total_calories");
        const date_picker = document.getElementById("date_picker");
        const week_label = document.getElementById("week_label");
        const popup = document.getElementById("popup");

        function active_tab(tab){
            current_tab = tab;
            
            buttons.forEach(btn => btn.classList.remove("active"));
            document.getElementById(tab).classList.add("active");

            if(tab === "daily"){
                date_picker.type = "date"
            }
            else if(tab === "weekly"){
                date_picker.type = "date"
            } 
            else if(tab === "monthly"){
                date_picker.type = "month"
            }

            date_display(current_tab)
            load_meals(current_tab, date_picker.value);
        }

        function date_display(tab){
            const date = new Date();

            if(tab === "daily"){
                const today = date.toISOString().split("T")[0];
                date_picker.value = today;
            }
            else if(tab === "weekly"){
                const today = date.toISOString().split("T")[0];
                date_picker.value = today;
            }
            else if (tab === "monthly"){
                const current_month = date.toISOString().slice(0, 7);
                date_picker.value = current_month
            }
        };

        async function load_meals(type, date){
            if(! date) return;

            const response = await fetch(`/get_meals?type=${type}&date=${date}`);
            const data = await response.json();

            week_label.innerHTML = "";

            if(type === "daily"){
                render_daily(data);
            }
            else if(type === "weekly"){
                render_weekly(data);
                week_label.innerHTML = `[ Week ${data.week}, ${data.year} ]`;
            }
            else if(type === "monthly"){
                render_monthly(data);
            }
        }

        function render_daily(data){
            meal_list.innerHTML = "";
            let total_kcal = 0;

            if(data.length === 0){
                meal_list.innerHTML = "<p>No meals found</p>";
                total_calories.innerText = "Total Calories: 0 kcal";
                return;
            }

            data.forEach((meal, index) => {
                total_kcal += meal.calories;

                meal_list.innerHTML += `
                    <div style = "margin-bottom: 20px; display: flex; align-items: flex-start; gap: 10px;">
                        <span title = "Delete Meal" style = "cursor: pointer; font-size: 18px;" onclick = "show_popup()">🗑️</span>
                        
                        <div style = "width: 100%;">
                            <div style = "display: flex; justify-content: space-between;">
                                <span>${index + 1}. ${meal.food_name}</span>
                                <span>${meal.calories} kcal</span>
                            </div>
                            <div style = "margin-left: 20px; margin-top: 5px; display: flex; gap: 30px;">
                                <span>Carbs: ${meal.carbs} g</span>
                                <span>Protein: ${meal.protein} g</span>
                                <span>Fats: ${meal.fats} g</span>
                            </div>
                        </div>
                    </div>`;
            });

            total_calories.innerText = `Total Calories: ${total_kcal} kcal`;
        }

        function render_weekly(data){
            meal_list.innerHTML = "";
            let total_kcal = 0;

            meal_list.innerHTML = "<p>No meals found</p>";
            total_calories.innerText = "Total Calories: 0 kcal";
            return;
        }

        function render_monthly(data){
            meal_list.innerHTML = "";
            let total_kcal = 0;

            meal_list.innerHTML = "<p>No meals found</p>";
            total_calories.innerText = "Total Calories: 0 kcal";
            return;
        }

        function show_popup(){
            popup.classList.add("show_popup");
        }
        
        function close_popup(){
            popup.classList.remove("show_popup");
        }

        buttons.forEach(button => {
            button.addEventListener("click", () => {
                active_tab(button.id);
            });
        });

        date_picker.addEventListener("change", () => {
            load_meals(current_tab, date_picker.value);
        });

        active_tab("daily");
    </script>
</body>
</html>

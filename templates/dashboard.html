<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - NutriFit</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            height: 100vh;
        }
        .navbar {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }
        h1 {
            margin: 10px;
            color: #333;
            font-size: 30px;
        }
        .user_button {
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }
        .user_button:hover {
            background: #e6f4ee;
        }
        .dropdown {
            position: absolute;
            top: 70px;
            right: 20px;
            width: 150px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }
        .dropdown a {
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
        } 
        .dropdown a:hover {
            background: #f5f5f5;
            font-weight: bold;
        }
        .dropdown.show {
            display: block;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px,1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .card {
            background: #ecf4f0;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #ddd;
            transition: 0.5s;
        }
        .card:hover {
            translate: 0 -10px;
        }
        .arrow {
            display: inline-block;
            transition: 0.5s;
        }
        .card:hover .arrow{
            translate: 10px 0;
        }
        .card a {
            text-decoration: none;
            color: inherit;
        }
        .progress-bar {
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            height: 20px;
        }
        .progress-fill {
            background: #764ba2;
            width: 0%;
            height: 100%;
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.5s;
        }
        button:hover {
            background: #0d9b6b;
        }
    </style>
</head>
<body>
<div class="navbar">
    <h1>🍏 NutriFit</h1>
    <h1>Dashboard</h1>
    <div>
        <h1 title="User Dropdown" class="user_button">👤 {{ user.name }}</h1>

        <div class="dropdown">
            <a href="/profile">Edit Profile</a>
            <a href="/logout">Logout</a>
        </div>
    </div>
</div>
<div class="container">
    <p>Welcome back, <strong>{{ user.name }}</strong>!</p>

    <div class="grid">
        <div class="card">
            <h3>📊 Today's Progress</h3>
            <div><span id="todayCalories"></span> / <span id="dailyGoal"></span> kcal</div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
            <div>🔥 Remaining: <span id="remaining"></span> kcal</div>
        </div>
        <div class="card">
            <h3>📸 Update Meal</h3>
            <a href="/upload">
                <button>Upload Photo of Meal</button>
            </a>
        </div>
        <div class="card">
            <a href="/history">
                <h3>🍽️ Watch Meal History <span class="arrow">➔</span></h3>
            </a>
        </div>
    </div>
</div>

<script>
    const user_button = document.querySelector(".user_button");
    const dropdown = document.querySelector(".dropdown");

    user_button.addEventListener("click", () => {
        dropdown.classList.toggle("show");
    });

    document.addEventListener("click", (event) => {
        if(
            !user_button.contains(event.target) &&
            !dropdown.contains(event.target)
        ){
            dropdown.classList.remove("show");
        }

    });
</script>
</body>
</html>

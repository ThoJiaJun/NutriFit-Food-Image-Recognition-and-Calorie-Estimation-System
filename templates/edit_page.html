<!DOCTYPE html>
<html>
<head>
    <title>Edit Food</title>
    
    <style>
        body{
            margin: 0;
            font-family: Arial;
            background-color: #baf8da;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
        }

        .navbar{
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px solid #666;
            background-color: #a3f6ce;
        }

        .navbar a{
            text-decoration: none;
            cursor: pointer;
        }

        h1{
            margin: 10px;
            color: #333;
            font-size: 30px;
        }

        .user_button{
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.5s;
        }

        .user_button:hover{
            background: #e6f4ee;
        }

        .dropdown{
            position: absolute;
            top: 70px;
            right: 20px;
            width: 150px;
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.12);
            overflow: hidden;
            display: none;
        }

        .dropdown a{
            display: block;
            padding: 14px 18px;
            text-decoration: none;
            color: #333;
            transition: 0.2s;
        } 

        .dropdown a:hover{
            background: #f5f5f5;
            font-weight: bold;
        }

        .dropdown.show{
            display: block;
        }
        
        .container{
            background: #ffffff;
            width: 85%;
            max-width: 750px;
            border-radius: 40px;
            padding: 40px;
            margin-top: 10px;
            position: relative;
        }

        h2{
            font-size: 28px;
            font-weight: bold;
            margin-top: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        .header_line{
            border: 0;
            height: 2px;
            background: #666;
            margin-bottom: 20px;
        }

        .edit_button{
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 12px;
            color:#666;
            padding: 4px 8px;
            border-radius: 4px;
            border: 1px solid #ccc;
            background-color: #fcfcfc;
            cursor: pointer;
            transition: background-color 0.2s ease;
        }

        .edit_button.active{
            background-color: #4caf50;
            color: #ffffff;
            border-color: #4caf50;
        }

        .table_headers,
        .item{
            display: grid;
            grid-template-columns: 50px 1fr 120px 60px;
            align-items: center;
            gap: 15px;
            padding: 10px 5px;
        }

        .table_headers{
            font-weight: bold;
            color: #666;
            font-size: 14px;
            text-align: left;
        }

        .table_headers .center,
        .item .center{
            text-align: center;
        }

        .row_num{
            color: #666;
        }

        .food_wrapper{
            position: relative;
            width: 100%;
        }

        .food_options{
            margin-top: 5px;
            width: 100%;
            padding: 8px;
            border-radius: 6px;
        }

        .food_options.error {
            border: 1px solid #ef4444;
            background-color: #f9d7da;
            color: #721c24;
            outline: none;
        }

        input{
            padding: 8px 12px;
            width: 100%;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        input:focus{
            outline: none;
            border-color: #10b981;
        }

        .delete_food{
            background: none;
            border: none;
            font-size: 18px;
            padding: 5px;
            transition: transform 0.2s;
            width: auto;
            cursor: pointer;
        }

        .delete_food:hover:not(:disabled){
            transform: scale(1.2);
        }

        .add_row{
            margin-top: 15px;
            text-align: left;
            padding: 0 5px;
        }

        .add_food{
            background: none;
            border: 2px dashed #cbd5e1;
            color: #64748b;
            font-size: 14px;
            font-weight: 600;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .add_food:hover:not(:disabled){
            background-color: #f8fafc;
            border-color: #94a3b8;
            color: #334155;
        }

        .food:disabled,
        .quantity:disabled,
        .delete_food:disabled, 
        .add_food:disabled{
            background-color: #f5f5f5;
            color: #333;
            cursor: not-allowed;
            border-color: #e8e8e8;
            opacity: 0.6;
        }

        button{
            flex: 1;
            padding: 20px;
            color: #ffffff;
            font-size: 22px;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.5s;
        }

        .buttons{
            display: flex;
            justify-content: space-between;
            gap: 30px;
            margin-top: 30px;
            margin-bottom: 20px;
            width: 85%;
            max-width: 800px;
        }

        .back{
            background-color: #f76565;
        }

        .back:hover{
            background-color: #f55050;
        }

        .continue{
            background-color: #10b981;
        }

        .continue:hover{
            background-color: #0d9b6b;
        }

        img{
            width: 400px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="navbar">
        <a href="/dashboard"><h1 title="Back to Dashboard">🍏 NutriFit</h1></a>
        <h1>Edit Food Details</h1>
        <div>
            <h1 title="User Dropdown" class="user_button">👤 {{ user.name }}</h1>

            <div class="dropdown">
                <a href="/profile">Edit Profile</a>
                <a href="/logout">Logout</a>
            </div>
        </div>
    </div>

    {% if boxed_image %}
        <img src="data:image/jpeg;base64,{{ boxed_image }}">
    {% endif %}

    <br><br>

    <div class="container">
        <h2>Detected Foods</h2>
        <button class="edit_button active" onclick="toggleEdit()">Edit Mode <strong>ON</strong></button>

        <hr class="header_line">

        <div class="table_headers">
            <div>No.</div>
            <div>Food Name</div>
            <div>Quantity</div>
            <div class="center"></div>
        </div>

        <div id="list">
            {% if detections %}

                {% for item in detections %}

                <div class="item">
                    <div class="row_num"></div>

                    <div class="food_wrapper">
                        <input type="text" placeholder="Food name" value="{{ item.food }}" class="food" oninput="showSuggestions(this)" required>
                        <select class="food_options" onmousedown="clearError(this)" onchange="selectFood(this)" style="display:none;"></select>
                    </div>

                    <input type="number" placeholder="Quantity" value="{{ item.quantity }}" class="quantity" min="1" required>

                    <div class="center">
                        <button title="Delete Food" class="delete_food" onclick="removeItem(this)">🗑️</button>
                    </div>
                </div>

                {% endfor %}

            {% else %}

                <div class="item">
                    <div class="row_num"></div>

                    <div class="food_wrapper">
                        <input type="text" placeholder="Food name" class="food" oninput="showSuggestions(this)" required>
                        <select class="food_options" onmousedown="clearError(this)" onchange="selectFood(this)" style="display:none;"></select>
                    </div>

                    <input type="number" placeholder="Quantity" class="quantity" min="1" required>

                    <div class="center">
                        <button title="Delete Food" class="delete_food" onclick="removeItem(this)">🗑️</button>
                    </div>
                </div>
            {% endif %}

        </div>

        <div class="add_row">
            <button class="add_food" onclick="addFood()">+ Add Missing Food</button>
        </div>

    </div>

    <br>

    <div class="buttons">
        <button class="back" onclick="window.location.href='/upload'">Back</button>
        <button type="submit" class="continue" onclick="update_detections()">Continue</button>
    </div>

    <script>
        // User Dropdown
        const user_button = document.querySelector(".user_button");
        const dropdown = document.querySelector(".dropdown");

        user_button.addEventListener("click", () => {
            dropdown.classList.toggle("show");
        });

        document.addEventListener("click", (event) => {
            if(!user_button.contains(event.target) && !dropdown.contains(event.target)){
                dropdown.classList.remove("show");
            }

        });

        let editMode = true;        //Edit Mode is initially ON

        //Initialization configuration settings when entering edit page
        window.addEventListener("DOMContentLoaded", () => {
            updateRowNumbers();

            document.querySelectorAll(".food").forEach(input => {
                showSuggestions(input);
            });

            //If no food detected
            const food_input = document.querySelector(".food");
            if (food_input && food_input.value === "") {
                alert("Sorry! No food detected! Please enter the missing food manually😊");
            }
        });

        //Edit Mode ON/OFF
        function toggleEdit() {
            const edit_button = document.querySelector(".edit_button");

            editMode = !editMode;

            edit_button.classList.toggle("active");

            if (edit_button.classList.contains("active")) {
                edit_button.innerHTML = "Edit Mode <strong>ON</strong>";
            }
            else {
                edit_button.innerHTML = "Edit Mode <strong>OFF</strong>";
            }

            document
                .querySelectorAll(".food, .quantity, .delete_food, .add_food")
                .forEach(element => {
                    element.disabled = !editMode;
                });
        }

        // Update row numbers when food is deleted/added
        function updateRowNumbers() {
            const rows = document.querySelectorAll("#list .item");

            rows.forEach((row, index) => {
                const row_number = row.querySelector(".row_num");

                if (row_number) {
                    row_number.textContent = index + 1;
                }
            });
        }

        // Delete food
        function removeItem(btn) {
            btn.closest(".item").remove();
            updateRowNumbers();
        }

        //Add missing food
        function addFood() {
            const list = document.getElementById("list");
            const div = document.createElement("div");
            div.className = "item";

            div.innerHTML = `
                <div class="row_num"></div>

                <div class="food_wrapper">
                    <input type="text" placeholder="Food name" class="food" oninput="showSuggestions(this)" required>
                    <select class="food_options" onmousedown="clearError(this)" onchange="selectFood(this)" style="display:none;"></select>
                </div>

                <input type="number" placeholder="Quantity" class="quantity" min="1" required>

                <div class="center">
                    <button title="Delete Food" class="delete_food" onclick="removeItem(this)">🗑️</button>
                </div>
            `;

            list.appendChild(div);
            updateRowNumbers();
        }

        //Fetch food options from food database
        async function showSuggestions(input){
            const keyword = input.value.trim();
            const wrapper = input.closest(".food_wrapper");
            const dropdown = wrapper.querySelector(".food_options");

            //No food is selected from the dropdown initially
            input.setAttribute("food_selected", "false");
            dropdown.classList.remove("error");

            if(keyword.length < 2){
                dropdown.style.display = "none";
                return;
            }

            const response = await fetch(`/food_options?q=${encodeURIComponent(keyword)}`);
            const foods = await response.json();

            if(foods.length === 0){
                dropdown.style.display = "none";
                return;
            }

            dropdown.innerHTML = `<option value="">-- Select food option below --</option>`;

            foods.forEach(food => {
                dropdown.innerHTML += `<option value="${food}">${food}</option>`;
            });

            dropdown.style.display = "block";
        }

        //Remove red colour when users click the dropdown
        function clearError(dropdown) {
            dropdown.classList.remove("error");
        }

        //Changes after users selected food from dropdown
        function selectFood(dropdown){
            const wrapper = dropdown.closest(".food_wrapper");
            const input = wrapper.querySelector(".food");
            
            if (dropdown.value !== "") {
                input.value = dropdown.value;
                input.setAttribute("food_selected", "true");
                dropdown.classList.remove("error");
                dropdown.style.display = "none";
            }
        }

        //Fetch updated results to backend
        function update_detections() {
            const foods = [];

            for (const row of document.querySelectorAll(".item")) {
                const food_input = row.querySelector(".food");
                const quantity_input = row.querySelector(".quantity");
                const dropdown_select = row.querySelector(".food_options");

                const food = food_input.value.trim();
                const quantity = quantity_input.value;
                const food_selected = food_input.getAttribute("food_selected");

                //Check whether food name had been filled in
                if (food === "") {
                    alert("Please enter the missing food name!");
                    food_input.focus();
                    return;
                }

                //Check whether users had selected food from dropdown
                if (food_selected !== "true") {
                    dropdown_select.style.display = "block";
                    dropdown_select.classList.add("error");
                    dropdown_select.focus();
                    return;
                }

                //Check whether food quantity had been filled in and is > 0
                if (quantity === "" || Number(quantity) < 1) {
                    alert("Please enter a quantity greater than 0!");
                    quantity_input.focus();
                    return;
                }

                foods.push({
                    food: food,
                    quantity: parseInt(quantity)
                });
            }

            fetch("/update_detections", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify(foods)
            })

            .then(() => {
                window.location.href = "/result";
            });
        }
    </script>

</body>

</html>

<!DOCTYPE html>
<html>

<head>

    <title>Edit Food</title>

    <style>

        body {
            font-family: Arial;
            text-align: center;
        }

        .item {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;

            width: 80%;

            margin: auto;

            padding: 10px;

            border: 1px solid #ccc;

            margin-bottom: 10px;
        }

        input {
            padding: 5px;
            width: 120px;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        img {
            width: 400px;
            margin-top: 20px;
        }

    </style>

</head>

<body>

    <h2>Food Edit Page</h2>

    {% if image_file %}

        <img src="{{ url_for('static', filename='uploads/' + image_file) }}">

    {% endif %}

    <br><br>

    <button onclick="toggleEdit()">
        Enable / Disable Edit Mode
    </button>

    <button onclick="addFood()">
        + Add Missing Food
    </button>

    <h3>Detected Items</h3>

    <div id="list">

        {% for item in detections %}

        <div class="item">

            <!-- FOOD -->
            <input
                type="text"
                value="{{ item.food }}"
                class="food"
            >

            <!-- QUANTITY -->
            <input
                type="number"
                value="{{ item.quantity }}"
                class="quantity"
            >

            <!-- WEIGHT -->
            <input
                type="number"
                value="{{ item.weight }}"
                class="grams"
            >

            <!-- DELETE -->
            <button onclick="removeItem(this)">
                Delete
            </button>

        </div>

        {% endfor %}

    </div>

    <br>

    <button onclick="saveData()">
        Save Changes
    </button>

    <br><br>

    <a href="/">
        <button>
            Back Home
        </button>
    </a>

    <script>

        let editMode = true;

        function toggleEdit() {

            editMode = !editMode;

            document
                .querySelectorAll(".food, .quantity, .grams")
                .forEach(input => {

                    input.disabled = !editMode;

                });

            alert(
                editMode
                ? "Edit Mode ON"
                : "Edit Mode OFF"
            );
        }

        function removeItem(btn) {

            btn.parentElement.remove();

        }

        function addFood() {

            const list = document.getElementById("list");

            const div = document.createElement("div");

            div.className = "item";

            div.innerHTML = `
                <input type="text"
                       placeholder="Food name"
                       class="food">

                <input type="number"
                       placeholder="Quantity"
                       class="quantity">

                <input type="number"
                       placeholder="grams"
                       class="grams">

                <button onclick="removeItem(this)">
                    Delete
                </button>
            `;

            list.appendChild(div);
        }

        function saveData() {

            let items = [];

            document
                .querySelectorAll(".item")
                .forEach(div => {

                    let food =
                        div.querySelector(".food").value;

                    let quantity =
                        div.querySelector(".quantity").value;

                    let grams =
                        div.querySelector(".grams").value;

                    items.push({
                        food,
                        quantity,
                        grams
                    });
                });

            console.log("Saved Data:", items);

            alert("Changes saved (demo mode)");
        }

    </script>

</body>

</html>

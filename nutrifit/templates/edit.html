<!DOCTYPE html>
<html>
<head>
    <title>Edit Food</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #f5f5f5;
        }

        img {
            width: 350px;
            margin-top: 15px;
            border-radius: 10px;
        }

        .item {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 10px auto;
            background: white;
            padding: 10px;
            width: 60%;
            border-radius: 8px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }

        input {
            padding: 6px;
        }

        button {
            padding: 8px 12px;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .add {
            background: #4caf50;
            color: white;
        }

        .continue {
            background: #4facfe;
            color: white;
        }

        .delete {
            background: #f44336;
            color: white;
        }

        .toggle {
            background: #ff9800;
            color: white;
        }

        .back {
            background: #333;
            color: white;
        }

        .toast {
            display: none;
            background: black;
            color: white;
            padding: 10px;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 6px;
        }
    </style>
</head>

<body>

<h2>Edit Food Detection</h2>

{% if image_file %}
    <img src="{{ url_for('static', filename='uploads/' + image_file) }}">
{% endif %}

<h3>Detected Items</h3>

<div id="list">

    {% for item in detections %}
    <div class="item">
        <input type="text" class="food" value="{{ item.food }}">
        <input type="number" class="weight" value="{{ item.weight }}">
        <button class="delete" onclick="removeItem(this)">X</button>
    </div>
    {% endfor %}

</div>

<br>

<!-- BUTTONS -->
<button class="add" onclick="addFood()">+ Add Food</button>
<button class="toggle" onclick="toggleEdit()">Toggle Edit</button>
<button class="continue" onclick="continueProcess()">Continue</button>

<br><br>

<a href="/">
    <button class="back">⬅ Go Back</button>
</a>

<div class="toast" id="toast">Data Ready ✔</div>

<script>

let editMode = true;

function removeItem(btn) {
    btn.parentElement.remove();
}

function addFood() {
    let div = document.createElement("div");
    div.className = "item";

    div.innerHTML = `
        <input type="text" class="food" placeholder="Food">
        <input type="number" class="weight" placeholder="Weight">
        <button class="delete" onclick="removeItem(this)">X</button>
    `;

    document.getElementById("list").appendChild(div);
}

function toggleEdit() {
    editMode = !editMode;

    document.querySelectorAll(".food, .weight").forEach(input => {
        input.disabled = !editMode;
    });

    alert(editMode ? "Edit Mode ON" : "Edit Mode OFF");
}

function continueProcess() {
    let data = [];

    document.querySelectorAll(".item").forEach(item => {
        data.push({
            food: item.querySelector(".food").value,
            weight: item.querySelector(".weight").value
        });
    });

    console.log("Sending to Member 3:", data);

    showToast();

    // OPTIONAL FUTURE INTEGRATION:
    // window.location.href = "/member3";
}

function showToast() {
    let toast = document.getElementById("toast");
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 2000);
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Detection Result</title>
</head>
<body style="text-align:center;">

<h2>Detection Result</h2>

{% if image_file %}
    <img src="{{ url_for('static', filename='uploads/' + image_file) }}" width="400">
{% endif %}

<h3>Detected Food (Estimated Weight)</h3>

{% if detections %}
    <ul>
        {% for item in detections %}
            <li>{{ item.food }} - {{ item.weight }} g</li>
        {% endfor %}
    </ul>
{% else %}
    <p>No food detected</p>
{% endif %}

<br>

<a href="/continue">
    <button>Continue</button>
</a>

<a href="/try_again">
    <button>Try Again</button>
</a>

</body>
</html>

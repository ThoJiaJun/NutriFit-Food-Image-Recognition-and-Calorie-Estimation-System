<!DOCTYPE html>
<html>
<head>
    <title>NutriFit Upload</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #8e2de2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .title {
            font-size: 42px;
            font-weight: bold;
            color: white;
            text-shadow: 2px 2px black;
            margin-bottom: 20px;
        }

        .box {
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.25);
            width: 300px;
        }

        input {
            margin-top: 10px;
        }

        .btn {
            padding: 10px 15px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            font-weight: bold;
        }

        .continue {
            background: #4facfe;
            color: white;
        }

        .back {
            background: #333;
            color: white;
        }

        /* LOADING SPINNER */
        .loader {
            display: none;
            margin-top: 10px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin-left: auto;
            margin-right: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg);}
            100% { transform: rotate(360deg);}
        }
    </style>
</head>

<body>

<div class="title">NutriFit</div>

<div class="box">

    <h3>Upload Food Image</h3>

    <form id="uploadForm" action="/upload" method="post" enctype="multipart/form-data">

        <input type="file" name="file" id="fileInput" required>

        <br><br>

        <button type="submit" class="btn continue">Analyze Food</button>
    </form>

    <div class="loader" id="loader"></div>

</div>

<script>
document.getElementById("uploadForm").addEventListener("submit", function() {
    document.getElementById("loader").style.display = "block";
});
</script>

</body>
</html>
